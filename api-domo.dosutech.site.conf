# ─────────────────────────────────────────────
# api-domo.dosutech.site — DOMO Toolkit Backend
# ─────────────────────────────────────────────
# Step 1: Deploy this file first (HTTP only)
# Step 2: Run certbot to add SSL + auto-redirect
#
# Deploy:
#   sudo cp api-domo.dosutech.site.conf /etc/nginx/sites-available/
#   sudo ln -s /etc/nginx/sites-available/api-domo.dosutech.site.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# SSL:
#   sudo certbot --nginx -d api-domo.dosutech.site
# ─────────────────────────────────────────────

server {
    listen 80;
    server_name api-domo.dosutech.site;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Max upload size (for CSV uploads if needed in future)
    client_max_body_size 50M;

    # Proxy to FastAPI backend (PM2 on port 8000)
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;

        # WebSocket support (for future SSE/WS)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Forward real client info
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts (pipeline can take ~10s)
        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 120s;

        # Buffering
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # Health check (no proxy overhead)
    location = /api/health {
        proxy_pass http://127.0.0.1:8000/api/health;
        proxy_set_header Host $host;
        access_log off;
    }

    # Block dot files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Logging
    access_log /var/log/nginx/api-domo.dosutech.site.access.log;
    error_log  /var/log/nginx/api-domo.dosutech.site.error.log;
}
